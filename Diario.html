<!DOCTYPE html>
<html lang="it">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Diario Uscite - Steam Guide Sardegna</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

<h1>📖 Diario Uscite</h1>

<p>Il tuo logbook personale</p>

</header>

<main>

<div class="card">

<h2>Nuova uscita</h2>

<p><strong>Data</strong></p>
<input type="date" style="width:100%;padding:10px;">

<p><strong>Località</strong></p>
<input type="text" placeholder="Es. Mare Morto" style="width:100%;padding:10px;">

<p><strong>Durata</strong></p>
<input type="text" placeholder="Es. 2h 30m" style="width:100%;padding:10px;">

<p><strong>Distanza</strong></p>
<input type="text" placeholder="Es. 7 km" style="width:100%;padding:10px;">

<p><strong>Note</strong></p>

<textarea rows="6" style="width:100%;padding:10px;" placeholder="Com'è andata l'uscita?"></textarea>

<br><br>

<button class="button">

Salva (versione futura)

</button>

</div>

<br>

<div class="card">

<h2>Statistiche</h2>

<p>🚣 Uscite: 0</p>

<p>📏 Km percorsi: 0</p>

<p>⏱ Ore pagaiate: 0</p>

<p>🏆 Itinerario preferito: -</p>

</div>

<br>

<a class="button" href="index.html">

🏠 Home

</a>

</main>

<footer>

Steam Guide Sardegna

</footer>

</body>

</html>
